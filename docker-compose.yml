services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olmos-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./public/assets:/var/www/html/public/assets
      - media_volume:/var/www/html/public/media
    networks:
      - olmos-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: olmos-db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: olmos_talent
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: user_password
      MYSQL_USER: olmos_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - olmos-network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: olmos-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - olmos-network
    depends_on:
      - db

networks:
  olmos-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  media_volume:
    driver: local
