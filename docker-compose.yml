services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stagemaster-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    ports:
      - "31415:80"
    volumes:
      - .:/var/www/html
      - ./public/assets:/var/www/html/public/assets
      - media_volume:/var/www/html/public/media
    networks:
      - stagemaster-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: stagemaster-db
    restart: unless-stopped
    tty: true
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: olmos_talent
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: user_password
      MYSQL_USER: olmos_user
    volumes:
      - dbdata:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./test_data.sql:/docker-entrypoint-initdb.d/02-test-data.sql:ro
    networks:
      - stagemaster-network

